name: Publish MCP Server to PyPI

on:
  push:
    tags:
      - 'mcp-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: mcp-server
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check version consistency
        id: version
        run: |
          PYPROJECT_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          SERVER_VERSION="$(python -c "import json; print(json.load(open('server.json'))['version'])")"
          PACKAGE_VERSION="$(python -c "import json; print(json.load(open('server.json'))['packages'][0]['version'])")"
          echo "pyproject=$PYPROJECT_VERSION  server.json=$SERVER_VERSION  package=$PACKAGE_VERSION"
          if [ "$PYPROJECT_VERSION" != "$SERVER_VERSION" ] || [ "$PYPROJECT_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Version mismatch — pyproject=$PYPROJECT_VERSION server.json=$SERVER_VERSION package=$PACKAGE_VERSION"
            exit 1
          fi
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#mcp-v}"
            if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
              echo "::error::Tag $GITHUB_REF_NAME does not match package version $PYPROJECT_VERSION"
              exit 1
            fi
          fi
          echo "version=$PYPROJECT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp-server/dist/

  publish-registry:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_amd64.tar.gz" \
            | tar -xz mcp-publisher

      - name: Wait for PyPI to expose the new release
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          for i in $(seq 1 20); do
            if curl -fsSL "https://pypi.org/pypi/veriswarm-mcp/${VERSION}/json" >/dev/null 2>&1; then
              echo "veriswarm-mcp ${VERSION} is live on PyPI."
              exit 0
            fi
            echo "Attempt $i: ${VERSION} not on PyPI yet, retrying in 15s..."
            sleep 15
          done
          echo "PyPI did not expose ${VERSION} in time." >&2
          exit 1

      - name: Login to MCP Registry (keyless OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
