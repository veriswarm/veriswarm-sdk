name: Publish Node.js SDK to npm

on:
  push:
    tags:
      - 'node-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Verify package
        run: npm pack --dry-run

      # No NODE_AUTH_TOKEN: npm exchanges the GitHub OIDC id-token for a
      # short-lived registry credential via the package's trusted publisher.
      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public --provenance
