name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify package builds
        run: |
          pip install build
          python -m build

  node-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify package
        run: npm pack --dry-run

  mcp-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install build
      - name: Verify package builds
        run: python -m build

  openclaw-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build

  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON schemas
        run: python3 -c "import json,glob,sys;[json.load(open(f)) for f in glob.glob('schemas/*.json')];print('All schemas valid')"
