name: Bug Report
description: Report a bug in a VeriSwarm SDK or MCP server
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - Python SDK (veriswarm)
        - Node.js SDK (@veriswarm/sdk)
        - MCP Server (veriswarm-mcp)
        - LangChain Adapter (veriswarm[langchain])
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include error messages if any.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Python 3.12, macOS 15, etc."
