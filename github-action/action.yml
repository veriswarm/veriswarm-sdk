name: "VeriSwarm Trust Check"
description: "Run trust score checks, PII scans, injection scans, and security tests against your AI agents in CI."
author: "VeriSwarm"
branding:
  icon: "shield"
  color: "orange"

inputs:
  api-key:
    description: "VeriSwarm API key (store as a GitHub secret)"
    required: true
  api-url:
    description: "VeriSwarm API URL"
    required: false
    default: "https://api.veriswarm.ai"
  agent-id:
    description: "Agent ID to check (required for score/test/decision)"
    required: false
  mode:
    description: "Check mode: score, test, scan, decision, owasp, compliance, or all"
    required: false
    default: "all"
  frameworks:
    description: "Comma-separated compliance framework slugs to evaluate in 'compliance' mode (e.g. 'eu-ai-act,nist-ai-rmf,nydfs-part-500'). Use 'all' for every framework. Slugs come from GET /v1/compliance/frameworks."
    required: false
    default: "eu-ai-act,nist-ai-rmf,iso-42001"
  min-compliance-pass-ratio:
    description: "Minimum per-framework pass ratio (pass / total controls) to pass the gate (0.0-1.0). 0 = no enforcement."
    required: false
    default: "0"
  fail-on-compliance-warn:
    description: "Fail the gate if any control's status is 'warn' (default: only fail on 'fail')."
    required: false
    default: "false"
  scan-paths:
    description: "Glob pattern for files to scan for PII (e.g., '**/*.py')"
    required: false
    default: ""
  action-type:
    description: "Action type for decision check (e.g., 'deploy', 'release')"
    required: false
    default: "deploy"
  fail-on-deny:
    description: "Fail the check if trust decision is 'deny'"
    required: false
    default: "true"
  fail-on-injection:
    description: "Fail the check if prompt injection is detected"
    required: false
    default: "true"
  fail-on-low-score:
    description: "Fail if security readiness score is below this threshold (0-100)"
    required: false
    default: "0"
  min-trust-score:
    description: "Minimum composite trust score to pass (0-100)"
    required: false
    default: "0"
  min-owasp-coverage:
    description: "Minimum OWASP Agentic Top 10 coverage score to pass (0.0-1.0). 0 = no enforcement."
    required: false
    default: "0"

outputs:
  trust-score:
    description: "Agent's composite trust score"
  policy-tier:
    description: "Agent's policy tier (allow/review/deny)"
  decision:
    description: "Trust decision for the action"
  readiness-score:
    description: "Security test readiness score (0-100)"
  pii-found:
    description: "Whether PII was detected in scanned files"
  injection-found:
    description: "Whether prompt injection was detected"
  owasp-coverage:
    description: "OWASP Agentic Top 10 coverage (e.g., '10/10')"
  owasp-score:
    description: "OWASP coverage score (0.0-1.0)"
  compliance-pass-ratio:
    description: "Worst per-framework pass ratio observed in 'compliance' mode (0.0-1.0)."
  compliance-frameworks-checked:
    description: "Comma-separated framework slugs that were actually evaluated."
  summary:
    description: "Human-readable summary of all checks"

runs:
  using: "composite"
  steps:
    - name: Mask VeriSwarm API key
      shell: bash
      # Defence-in-depth: explicit ::add-mask:: in case the caller
      # forgot to declare the value as a repo secret. GitHub's
      # default masking only applies to declared secrets; an
      # api-key passed as a literal `with:` value would otherwise
      # appear unmasked in workflow logs. (Audit 2026-05-08
      # MASKING-GAP.)
      env:
        VERISWARM_API_KEY: ${{ inputs.api-key }}
      run: |
        if [ -n "${VERISWARM_API_KEY}" ]; then
          echo "::add-mask::${VERISWARM_API_KEY}"
        fi

    - name: Run VeriSwarm checks
      shell: bash
      env:
        VERISWARM_API_KEY: ${{ inputs.api-key }}
        VERISWARM_API_URL: ${{ inputs.api-url }}
        VERISWARM_AGENT_ID: ${{ inputs.agent-id }}
        VERISWARM_MODE: ${{ inputs.mode }}
        VERISWARM_SCAN_PATHS: ${{ inputs.scan-paths }}
        VERISWARM_ACTION_TYPE: ${{ inputs.action-type }}
        VERISWARM_FAIL_ON_DENY: ${{ inputs.fail-on-deny }}
        VERISWARM_FAIL_ON_INJECTION: ${{ inputs.fail-on-injection }}
        VERISWARM_FAIL_ON_LOW_SCORE: ${{ inputs.fail-on-low-score }}
        VERISWARM_MIN_TRUST_SCORE: ${{ inputs.min-trust-score }}
        VERISWARM_MIN_OWASP_COVERAGE: ${{ inputs.min-owasp-coverage }}
        VERISWARM_FRAMEWORKS: ${{ inputs.frameworks }}
        VERISWARM_MIN_COMPLIANCE_PASS_RATIO: ${{ inputs.min-compliance-pass-ratio }}
        VERISWARM_FAIL_ON_COMPLIANCE_WARN: ${{ inputs.fail-on-compliance-warn }}
      # Quote github.action_path defence-in-depth against shell
      # word-splitting if the path ever contains spaces. (Audit
      # 2026-05-08 HIGH-SDK-8.)
      run: |
        python3 "${{ github.action_path }}/check.py"
